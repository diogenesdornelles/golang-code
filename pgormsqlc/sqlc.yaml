version: "2"
sql:
  - engine: "postgresql"
    name: "db"
    queries: "db/queries/query.sql"
    schema: "db/temp/schema.sql"
    # database:
    #   uri: "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable"
    gen:
      go:
        package: "generated"
        sql_driver: "github.com/jackc/pgx/v5"
        out: "generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        # blank_identifiers: true
        # emit_prepared_queries: true
        # emit_interface: true
        # emit_exact_table_names: true
        # emit_empty_slices: true
        # emit_db_tags: true
        # emit_default_values: true
        # emit_exported_queries: true
        # emit_query_docs: true
        # emit_enum_values: true
        # emit_result_structs: true
        # emit_query_structs: true
        # emit_interface_queries: true
        # emit_interface_results: true
        # emit_interface_structs: true
        # emit_interface_enums: true
        # emit_interface_constants: true
